schema_version: 1

context:
  mvapich_version: "4.1"
  shs_libfabric_version: "2.2.0"
  ucx_version: "1.20.0"
  build: 19

package:
  name: mvapich
  version: ${{ mvapich_version }}

source:
  - url: https://mvapich.cse.ohio-state.edu/download/mvapich/mv2/mvapich-${{ mvapich_version }}.tar.gz
    sha256: 25a53d3725b669e2c648158fb7c9fc5b1388953f3a2f949748586c447d0e43ee
    target_directory: mvapich
    patches:
      - fix_ucr_domain.patch
  - url: https://github.com/HewlettPackard/shs-libfabric/archive/refs/tags/v${{ shs_libfabric_version }}.tar.gz
    sha256: 734aa46fc1a5c69c59514aade3e8f17037506fbb08013f4be63d669e546570b0
    target_directory: shs-libfabric
    patches:
      - fix_reallocarray.patch
      - define_map_huge_shift.patch
  - url: https://github.com/openucx/ucx/releases/download/v${{ ucx_version }}/ucx-${{ ucx_version }}.tar.gz
    sha256: 7c8a6093cada179aa1d851b83625e3b25ed5658966e309de5118c27a038c7ef9
    target_directory: ucx

build:
  number: ${{ build }}
  skip:
    - if: win or osx
      then: true
  script: build.sh

requirements:
  build:
    - autoconf
    - automake
    - bison
    - ${{ compiler('c') }}
    - ${{ compiler('cxx') }}
    - ${{ compiler('fortran') }}
    - ${{ stdlib("c") }}
    - libtool
    - make
    - patchelf
    - pkg-config
  host:
    - knem-headers
    - json-c
    - libcurl
    - libgomp
    - libhwloc
    - libnl
    - rdma-core
    - shs-cassini-headers
    - shs-cxi-drivers
    - shs-libcxi
    - xpmem
  run:
    - _openmp_mutex
    - knem-headers
    - json-c
    - libcurl
    - libfuse
    - libhwloc
    - libnl
    - mpi 1.0.* mvapich
    - rdma-core
    - shs-libcxi
    - xpmem
  run_exports:
    - ${{ pin_subpackage('mvapich', upper_bound='x.x') }}

tests:
  - script:
      - test -f $PREFIX/lib/libmpi.so
      - test -f $PREFIX/lib/libmpifort.so
      - test -f $PREFIX/bin/mpicc
      - test -f $PREFIX/bin/mpifort
      - test -f $PREFIX/bin/mpiexec
      - $PREFIX/bin/mpicc -o hello_mpi hello.c
      - $PREFIX/bin/mpiexec -np 2 ./hello_mpi
    requirements:
      build:
        - ${{ compiler('c') }}
    files:
      recipe:
        - hello.c

about:
  homepage: https://mvapich.cse.ohio-state.edu/
  license: BSD-3-Clause AND (BSD-2-Clause OR GPL-2.0-only)
  license_file:
    - mvapich/COPYRIGHT
    - shs-libfabric/COPYING
  summary: MVAPICH, a high-performance MPI library by The Ohio State University.
  description: |
    MVAPICH is a high-performance implementation of the MPI (Message Passing Interface) standard
    with support for **both** Unified Communication X (UCX) and Open Fabric Interfaces (OFI),
    including CXI provider support for Slingshot Host Systems (use `export FI_PROVIDER=cxi` to *enable* it).

    In case the actual *netmod* is not correctly recognized at run time, activate it using either `MPICH_CH4_NETMOD=ucx` or `MPICH_CH4_NETMOD=ofi`.

extra:
  recipe-maintainers:
    - j34ni
